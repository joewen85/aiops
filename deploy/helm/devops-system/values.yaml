backend:
  image: devops-backend:latest
  replicas: 1
  servicePort: 8080
  env:
    APP_PORT: "8080"
    APP_ENV: "production"
    JWT_SECRET: "change-me-in-prod"
    JWT_EXPIRE_HOURS: "24"
    POSTGRES_DSN: "host=postgres user=devops password=devops dbname=devops port=5432 sslmode=disable TimeZone=UTC"
    REDIS_ADDR: "redis:6379"
    REDIS_PASSWORD: ""
    REDIS_DB: "0"
    RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    ANSIBLE_BIN: "ansible-playbook"
    PLAYBOOK_TMP_DIR: "/tmp/devops-playbooks"

frontend:
  image: devops-frontend:latest
  replicas: 1
  servicePort: 80

ingress:
  enabled: false
  className: nginx
  host: devops.local
