openapi: 3.0.3
info:
  title: SME DevOps API
  version: 0.1.0
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: RBAC
  - name: User
  - name: CMDB
  - name: Task
  - name: Cloud
  - name: Ticket
  - name: Message
  - name: AIOps
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccess:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
    ApiError:
      type: object
      properties:
        code:
          type: integer
          example: 3001
        message:
          type: string
          example: invalid request
    PageData:
      type: object
      properties:
        list:
          type: array
          items:
            type: object
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
paths:
  /healthz:
    get:
      summary: health check
      responses:
        "200":
          description: healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /auth/login:
    post:
      tags: [Auth]
      summary: user login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: login success
        "401":
          description: auth failed
  /auth/me/permissions:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: current user permission keys
      parameters:
        - name: compact
          in: query
          description: return compact permission bundle without full permission objects (`1` enabled)
          schema:
            type: string
            enum: ["0", "1"]
      responses:
        "200":
          description: ok
  /users:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: user list
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: create user
      responses:
        "200":
          description: created
  /departments:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list departments
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: create department
      responses:
        "200":
          description: created
  /departments/tree:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list department tree
      responses:
        "200":
          description: ok
  /departments/{id}:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get department detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [User]
      security:
        - bearerAuth: []
      summary: update department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    delete:
      tags: [User]
      security:
        - bearerAuth: []
      summary: delete department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /departments/{id}/users:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get department user bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind department users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /users/{id}/roles:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get user role bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind user roles
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /users/{id}/departments:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get user department bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind user departments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /roles:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: list roles
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: create role
      responses:
        "200":
          description: created
  /roles/{id}:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get role detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: update role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: updated
    delete:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: delete role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: deleted
  /roles/{id}/permissions:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get role permission bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: bind permissions to role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: ok
  /permissions:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: list permissions
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: create permission
      responses:
        "200":
          description: created
  /permissions/{id}:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get permission detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: update permission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: updated
    delete:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: delete permission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: deleted
  /cmdb/resources:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: list cmdb resources
      responses:
        "200":
          description: ok
  /tasks:
    get:
      tags: [Task]
      security:
        - bearerAuth: []
      summary: list tasks
      responses:
        "200":
          description: ok
  /tasks/{id}/execute:
    post:
      tags: [Task]
      security:
        - bearerAuth: []
      summary: execute task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: execution accepted
  /messages:
    get:
      tags: [Message]
      security:
        - bearerAuth: []
      summary: list in-app messages
      responses:
        "200":
          description: ok
    post:
      tags: [Message]
      security:
        - bearerAuth: []
      summary: create and publish message
      responses:
        "200":
          description: created
  /cloud/accounts:
    get:
      tags: [Cloud]
      security:
        - bearerAuth: []
      summary: list cloud accounts
      responses:
        "200":
          description: ok
  /tickets:
    get:
      tags: [Ticket]
      security:
        - bearerAuth: []
      summary: list tickets
      responses:
        "200":
          description: ok
  /aiops/chat:
    post:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: aiops chat
      responses:
        "200":
          description: response
