openapi: 3.0.3
info:
  title: SME DevOps API
  version: 0.1.0
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: RBAC
  - name: User
  - name: CMDB
  - name: Task
  - name: Cloud
  - name: Ticket
  - name: Message
  - name: AIOps
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccess:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
    ApiError:
      type: object
      properties:
        code:
          type: integer
          example: 3001
        message:
          type: string
          example: invalid request
    PageData:
      type: object
      properties:
        list:
          type: array
          items:
            type: object
        total:
          type: integer
          format: int64
        page:
          type: integer
        pageSize:
          type: integer
    CmdbResource:
      type: object
      properties:
        id:
          type: integer
        ci_id:
          type: string
        type:
          type: string
        name:
          type: string
        cloud:
          type: string
        region:
          type: string
        env:
          type: string
        owner:
          type: string
        lifecycle:
          type: string
        source:
          type: string
          enum: [IaC, CloudAPI, K8s, APM, Manual]
        last_seen_at:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties: true
    CmdbRelation:
      type: object
      properties:
        id:
          type: integer
        from_ci_id:
          type: string
        to_ci_id:
          type: string
        relation_type:
          type: string
          enum:
            - deployed_on
            - runs_in
            - connects_to
            - publishes_to
            - consumes_from
            - fronted_by
            - resolves_via
            - stores_in
            - owned_by
            - provisioned_by
        direction:
          type: string
          enum: [outbound, inbound, bidirectional]
        criticality:
          type: string
          enum: [P0, P1, P2, P3]
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        evidence:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    CmdbSyncJob:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, running, success, failed]
        source_priority:
          type: array
          items:
            type: string
            enum: [IaC, CloudAPI, K8s, APM, Manual]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
paths:
  /healthz:
    get:
      summary: health check
      responses:
        "200":
          description: healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /auth/login:
    post:
      tags: [Auth]
      summary: user login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: login success
        "401":
          description: auth failed
  /auth/me/permissions:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: current user permission keys
      parameters:
        - name: compact
          in: query
          description: return compact permission bundle without full permission objects (`1` enabled)
          schema:
            type: string
            enum: ["0", "1"]
      responses:
        "200":
          description: ok
  /users:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: user list
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: create user
      responses:
        "200":
          description: created
  /departments:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list departments
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: create department
      responses:
        "200":
          description: created
  /departments/tree:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: list department tree
      responses:
        "200":
          description: ok
  /departments/{id}:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get department detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [User]
      security:
        - bearerAuth: []
      summary: update department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    delete:
      tags: [User]
      security:
        - bearerAuth: []
      summary: delete department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /departments/{id}/users:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get department user bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind department users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /users/{id}/roles:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get user role bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind user roles
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /users/{id}/departments:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: get user department bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: bind user departments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /roles:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: list roles
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: create role
      responses:
        "200":
          description: created
  /roles/{id}:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get role detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: update role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: updated
    delete:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: delete role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: deleted
  /roles/{id}/permissions:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get role permission bindings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: bind permissions to role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: ok
  /permissions:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: list permissions
      responses:
        "200":
          description: ok
    post:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: create permission
      responses:
        "200":
          description: created
  /permissions/{id}:
    get:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: get permission detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
    put:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: update permission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: updated
    delete:
      tags: [RBAC]
      security:
        - bearerAuth: []
      summary: delete permission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: deleted
  /cmdb/resources:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: list cmdb resources
      responses:
        "200":
          description: ok
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: create cmdb resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmdbResource"
      responses:
        "200":
          description: created
  /cmdb/categories:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: list cmdb categories
      responses:
        "200":
          description: ok
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: create cmdb category
      responses:
        "200":
          description: created
  /cmdb/tags:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: list cmdb tags
      responses:
        "200":
          description: ok
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: create cmdb tag
      responses:
        "200":
          description: created
  /cmdb/resources/{id}/tags:
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: bind tags to cmdb resource
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: ok
  /cmdb/relations:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: list cmdb relations
      responses:
        "200":
          description: ok
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: create cmdb relation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmdbRelation"
      responses:
        "200":
          description: created
  /cmdb/resources/{id}/upstream:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: get resource upstream dependencies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /cmdb/resources/{id}/downstream:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: get resource downstream dependencies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /cmdb/topology/{application}:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: get application dependency topology
      parameters:
        - in: path
          name: application
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
  /cmdb/impact/{ciId}:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: analyze impact scope by ci
      parameters:
        - in: path
          name: ciId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
  /cmdb/regions/{region}/failover:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: analyze region failover coverage
      parameters:
        - in: path
          name: region
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
  /cmdb/change-impact/{releaseId}:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: analyze release change impact
      parameters:
        - in: path
          name: releaseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
  /cmdb/sync/jobs:
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: create cmdb sync job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: array
                  items:
                    type: string
                    enum: [IaC, CloudAPI, K8s, APM, Manual]
                fullScan:
                  type: boolean
      responses:
        "200":
          description: accepted
  /cmdb/sync/jobs/{id}:
    get:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: get cmdb sync job detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ok
  /cmdb/sync/jobs/{id}/retry:
    post:
      tags: [CMDB]
      security:
        - bearerAuth: []
      summary: retry cmdb sync job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: accepted
  /tasks:
    get:
      tags: [Task]
      security:
        - bearerAuth: []
      summary: list tasks
      responses:
        "200":
          description: ok
  /tasks/{id}/execute:
    post:
      tags: [Task]
      security:
        - bearerAuth: []
      summary: execute task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: execution accepted
  /messages:
    get:
      tags: [Message]
      security:
        - bearerAuth: []
      summary: list in-app messages
      responses:
        "200":
          description: ok
    post:
      tags: [Message]
      security:
        - bearerAuth: []
      summary: create and publish message
      responses:
        "200":
          description: created
  /cloud/accounts:
    get:
      tags: [Cloud]
      security:
        - bearerAuth: []
      summary: list cloud accounts
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: keyword
          schema:
            type: string
          description: match on account name or access key
        - in: query
          name: provider
          schema:
            type: string
          description: cloud provider, e.g. aws/aliyun/tencent/huawei
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: verified
          schema:
            type: string
            enum: ["true", "false", "1", "0", "yes", "no"]
          description: verification status filter
      responses:
        "200":
          description: ok
  /tickets:
    get:
      tags: [Ticket]
      security:
        - bearerAuth: []
      summary: list tickets
      responses:
        "200":
          description: ok
  /aiops/chat:
    post:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: aiops chat
      responses:
        "200":
          description: response
  /aiops/procurement/protocol:
    get:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: get aiops procurement protocol spec
      responses:
        "200":
          description: protocol spec
  /aiops/procurement/intents:
    post:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: parse procurement intent from natural language
      responses:
        "200":
          description: parsed intent
  /aiops/procurement/plans:
    post:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: build procurement execution plan
      responses:
        "200":
          description: procurement plan
  /aiops/procurement/executions:
    post:
      tags: [AIOps]
      security:
        - bearerAuth: []
      summary: execute procurement plan (supports dry-run)
      responses:
        "200":
          description: execution result
